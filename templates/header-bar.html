  <div>
    <div class="bar-header">
      <!-- <button>k</button> -->
      <div class="bar-header-title">
        <h2>
          <span class="no-space-span">
            <a href="/">
              <span class="title-initial">Fin</span>
              <span class="title-later">ance</span>
            </a>

          </span>
        </h2>
      </div>

      <div class="search-container">
        <form id="stockForm" class="yahoo-search-form">
          <div class="yahoo-search-box">
            <input type="text" id="queryInput" placeholder="Search stocks.."
              style="padding: 5px; margin-bottom: 5px; box-sizing: border-box" required autocomplete="off" />
            <button type="submit" class="search-btn" area-label="Search" style="
                  padding: 5px;
                  background: #4b29b9;
                  color: white;
                  border: none;
                ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#00C851">
                <path
                  d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
              </svg>
            </button>
          </div>
        </form>

        <div id="livePrices"></div>
      </div>

      <div class="date-time-container">
        <div class="header-clock">
          <span id="clock-date" class="clock-date"></span>
          <span id="clock-time" class="clock-time"></span>
        </div>
        <!-- Hidden date picker -->
        <input type="date" id="date-picker" class="hidden-date-picker">
      </div>

      <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
           <svg class="theme-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <!-- Larger glowing center (r=6 → bigger) -->
            <circle cx="12" cy="12" r="6" stroke="none" fill="currentColor" opacity="0.9" />
      
            <!-- Prominent 16 rays (longer + tapered) -->
            <path d="M12 2 L12.5 1 L13 2 M12 22 L12.5 23 L13 22" />
            <path d="M2 12 L1 12.5 L2 13 M22 12 L23 12.5 L22 13" />
            <path d="M4.9 4.9 L5.2 4.6 L5.5 4.9 M19.1 19.1 L18.8 19.4 L19.1 19.7" />
            <path d="M19.1 4.9 L18.8 5.2 L19.1 5.5 M4.9 19.1 L5.2 18.8 L5.5 19.1" />
            <path d="M7.8 7.8 L8 7.5 L8.2 7.8 M16.2 16.2 L16 16.5 L16.2 16.8" />
            <path d="M16.2 7.8 L16 8 L16.2 8.2 M7.8 16.2 L8 16 L8.2 16" />
      
            <!-- Outer glow ring -->
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3" />
          </svg>
      
          <div class="moon-icon"></div>
        </button>
      </div>

    </div>
    <hr class="divider" />
  </div>
